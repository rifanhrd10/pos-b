services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bayaro_pos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pos-app:
    build: .
    container_name: pos-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/bayaro_pos"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "https://pos.bayaro.id"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "https://pos.bayaro.id"
      UPLOAD_DIR: "/app/public/uploads"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      NODE_ENV: production
    volumes:
      - upload_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
